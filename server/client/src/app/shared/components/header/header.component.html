<nav class="app-header">
  <div class="brand hover" (click)="navigateHome()">
    <div class="logo d-flex gap-2 align-items-center">
      <div class="brand-mark">B</div>
      <div class="brand-copy">
        <div class="brand-title">Budgety</div>
        <div class="brand-subtitle">Smart planning</div>
      </div>
    </div>

  @if (user$ | async; as user) {
    <div class="nav-links d-flex gap-2 align-items-center ms-4">
      <button mat-button routerLink="/latest" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>article</mat-icon>
        <span>Latest</span>
      </button>
      <button mat-button routerLink="/monthly" routerLinkActive="active">
        <mat-icon>calendar_month</mat-icon>
        <span>Monthly</span>
      </button>
      <button mat-button routerLink="/yearly" routerLinkActive="active">
        <mat-icon>timeline</mat-icon>
        <span>Yearly</span>
      </button>
    </div>
  }

  </div>


  @if (user$ | async; as user) {
  <div class="header-actions">
    <mat-icon class="material-icons-outlined icon-md hover menu-toggle" [matMenuTriggerFor]="menu">menu</mat-icon>
    <mat-menu #menu="matMenu" class="main-menu mat-menu-md">
      <div class="d-flex flex-column">
        <div>
          <div>
            <div class="border-bottom margin-auto pb-1">
              <span
                class="d-flex justify-content-center align-items-center text-black text-uppercase text-semi-bold text-sm">
                <mat-icon class="material-icons-outlined icon-sm hover mr-1">person</mat-icon>
                {{ user?.name?.givenName }} {{ user?.name?.familyName }}
              </span>
            </div>
            <div class="d-flex">
              <div class="flex-fill">
                <img [src]="$safeNavigationMigration(user?.picture)" alt="profile picture"
                  class="profile-picture mt-2 mb-2" />
              </div>
            </div>
          </div>
        </div>
        <div *appHasRole="'Admin'">
          <div class="border-bottom margin-auto pb-1">
            <span class="d-flex text-black text-uppercase text-semi-bold text-sm">
              <mat-icon class="material-icons-outlined icon-sm hover mr-1">person</mat-icon>
              admin
            </span>
          </div>
          <div class="d-flex">
            <div class="flex-fill">
              <button mat-button color="primary" [routerLink]="['/dashboard']">
                dashboard
              </button>
            </div>
          </div>
        </div>
        <div>
          <div class="border-bottom margin-auto pb-1">
            <span class="d-flex text-black text-uppercase text-semi-bold text-sm">
              <mat-icon class="material-icons-outlined icon-sm hover mr-1">category</mat-icon>
              categories
            </span>
          </div>
          <div class="d-flex pt-1 pb-1">
            <div class="flex-fill">
              <button mat-button color="primary" [routerLink]="['categories-action/add']">
                create
              </button>
            </div>
            <div class="divider"></div>
            <div class="flex-fill">
              <button mat-button color="primary" [routerLink]="['/edit-category']">
                edit
              </button>
            </div>
          </div>
        </div>
        <div>
          <div class="border-bottom margin-auto pb-1">
            <span class="d-flex text-black text-uppercase text-semi-bold text-sm">
              <mat-icon class="material-icons-outlined icon-sm hover mr-1">palette</mat-icon>
              colors
            </span>
          </div>
          <div class="d-flex border-bottom pt-1 pb-1">
            <div class="flex-fill">
              <button mat-button color="primary" [routerLink]="['/add-color']">
                create
              </button>
            </div>
            <div class="divider"></div>
            <div class="flex-fill">
              <button mat-button color="primary" [routerLink]="['/edit-color']">
                edit
              </button>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-end align-items-center p-1">
          <button mat-raised-button color="primary" (click)="logout()">
            Logout
          </button>
        </div>
      </div>
    </mat-menu>
  </div>
  } @else {
  <button mat-raised-button color="primary" (click)="login()">
    Login with Google
  </button>
  }
</nav>
